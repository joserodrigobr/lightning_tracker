version: '3.8'

services:
  # Aplicação principal - Sentinel BlueOcean
  sentinel:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sentinel-blueocean
    
    # Variáveis de ambiente
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - TZ=America/Sao_Paulo
      # Configurar conforme necessário:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=sentinel_db
      - DB_USER=sentinel_user
      - DB_PASSWORD=sentinel_password
    
    # Volumes para persistência de dados
    volumes:
      - ./data:/app/data
      - ./output:/app/output
      - ./logs:/app/logs
      - ./config:/app/config
    
    # Redes
    networks:
      - sentinel-network
    
    # Dependência de serviços
    depends_on:
      postgres:
        condition: service_healthy
    
    # Configuração de reinício
    restart: unless-stopped
    
    # Limites de recursos (opcional)
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '2'
    #       memory: 4G
    #     reservations:
    #       cpus: '1'
    #       memory: 2G

  # Banco de dados PostgreSQL (opcional - remova se não usar)
  postgres:
    image: postgres:15-alpine
    container_name: sentinel-postgres
    
    environment:
      - POSTGRES_DB=sentinel_db
      - POSTGRES_USER=sentinel_user
      - POSTGRES_PASSWORD=sentinel_password
      - TZ=America/Sao_Paulo
    
    volumes:
      - postgres_data:/var/lib/postgresql/data
    
    networks:
      - sentinel-network
    
    # Health check
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel_user -d sentinel_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  sentinel-network:
    driver: bridge
